# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# Autostart wiki https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once = swaybg -o \* -i /usr/share/sddm/themes/corners-new/backgrounds/wallhaven-pkogxm.jpg  -m fill
exec-once = waybar &

exec-once = mako &
exec-once = nm-applet --indicator &
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &
exec-once = /usr/bin/lxqt-policykit-agent &
exec-once = gnome-keyring-daemon --start --components=secrets &
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark' &
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Catppuccin-Green-Dark' &
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'capitaine-cursors' &


# ## Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

# ## Idle configuration
exec-once = $idlehandler
