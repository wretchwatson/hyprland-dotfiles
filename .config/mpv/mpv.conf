# MPV Configuration
# ==================

# Video Ayarları
vo=gpu-next                    # Modern GPU renderer
hwdec=auto-safe               # Donanım hızlandırma
profile=gpu-hq                # Yüksek kalite profil

# Ses Ayarları
ao=pipewire,pulse,alsa        # Ses çıkışı öncelik sırası
volume=70                     # Varsayılan ses seviyesi
volume-max=150               # Maksimum ses seviyesi

# Altyazı Ayarları
sub-auto=fuzzy               # Otomatik altyazı bulma
sub-file-paths=ass:srt:sub:subs:subtitles    # Altyazı klasörleri
sub-font="Noto Sans"         # Altyazı fontu
sub-font-size=45             # Altyazı boyutu
sub-color="#FFFFFF"          # Altyazı rengi
sub-border-color="#000000"   # Altyazı kenarlık rengi
sub-border-size=2            # Altyazı kenarlık kalınlığı

# Performans Ayarları
cache=yes                    # Cache kullan
demuxer-max-bytes=150MiB     # Demuxer buffer boyutu
demuxer-max-back-bytes=75MiB # Geri buffer boyutu

# Arayüz Ayarları
osc=yes                      # On-screen controller
osd-level=1                  # OSD seviyesi
osd-duration=2000            # OSD görünme süresi (ms)
cursor-autohide=1000         # Mouse cursor gizleme (ms)

# Pencere Ayarları
keep-open=yes                # Video bitince pencereyi açık tut
save-position-on-quit=yes    # Pozisyonu kaydet
geometry=50%:50%             # Pencere konumu (merkez)
autofit-larger=90%x90%       # Büyük videolar için otomatik boyutlandırma

# Kalite Ayarları
scale=ewa_lanczossharp       # Upscaling algoritması
cscale=ewa_lanczossharp      # Chroma upscaling
dscale=mitchell              # Downscaling algoritması
correct-downscaling=yes      # Downscaling düzeltmesi
linear-downscaling=yes       # Linear downscaling

# Diğer Ayarları
screenshot-format=png        # Ekran görüntüsü formatı
screenshot-png-compression=8 # PNG sıkıştırma seviyesi
screenshot-directory="~/Resimler/Screenshots"  # Ekran görüntüsü klasörü

# Dil Ayarları
slang=tr,tur,en,eng         # Altyazı dil önceliği
alang=tr,tur,en,eng         # Ses dil önceliği

# Ağ Ayarları
ytdl-format=bestvideo[height<=?1080]+bestaudio/best[height<=?1080]  # YouTube kalitesi