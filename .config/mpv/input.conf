# MPV Klavye Kısayolları
# =======================

# Temel Kontroller
SPACE cycle pause                    # Oynat/Duraklat
q quit                              # Çıkış
Q quit-watch-later                  # Pozisyonu kaydet ve çıkış

# Ses Kontrolleri
UP add volume 5                     # Ses yükselt
DOWN add volume -5                  # Ses alçalt
m cycle mute                        # Sessiz/Aç

# Arama Kontrolleri
RIGHT seek 10                       # 10 saniye ileri
LEFT seek -10                       # 10 saniye geri
Shift+RIGHT seek 60                 # 1 dakika ileri
Shift+LEFT seek -60                 # 1 dakika geri

# Hız Kontrolleri
] multiply speed 1.1                # Hızlandır
[ multiply speed 1/1.1              # Yavaşlat
BS set speed 1.0                    # Normal hız

# Tam Ekran
f cycle fullscreen                  # Tam ekran aç/kapat
ESC set fullscreen no               # Tam ekrandan çık

# Altyazı Kontrolleri
v cycle sub-visibility              # Altyazı göster/gizle
j cycle sub                         # Sonraki altyazı
J cycle sub down                    # Önceki altyazı
z add sub-delay -0.1                # Altyazı gecikmesi azalt
x add sub-delay +0.1                # Altyazı gecikmesi artır

# Ses Parçası
a cycle audio                       # Sonraki ses parçası
A cycle audio down                  # Önceki ses parçası

# Ekran Görüntüsü
s screenshot                        # Ekran görüntüsü al
S screenshot video                  # Video ekran görüntüsü

# Playlist
< playlist-prev                     # Önceki dosya
> playlist-next                     # Sonraki dosya

# Pencere Kontrolleri
Alt+0 set window-scale 0.5          # Pencere %50
Alt+1 set window-scale 1.0          # Pencere %100
Alt+2 set window-scale 2.0          # Pencere %200

# OSD Bilgileri
o show-progress                     # İlerleme çubuğu göster
O no-osd cycle-values osd-level 3 1 # OSD seviyesi değiştir
i script-binding stats/display-stats-toggle  # İstatistikler