Section "Monitor"
    Identifier "DP-1"
    Modeline "1920x1080_240.00" 452.50 1920 2088 2296 2672 1080 1083 1088 1135 -hsync +vsync
    Option "PreferredMode" "1920x1080_240.00"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Device0"
    Monitor "DP-1"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1920x1080_240.00"
    EndSubSection
EndSection

Section "Device"
    Identifier "Device0"
    Driver "nvidia"
    Option "Coolbits" "28"
    Option "TripleBuffer" "true"
    Option "UseDisplayDevice" "DP-1"
    Option "ConnectedMonitor" "DP-1"
    Option "CustomEDID" "DP-1:/sys/class/drm/card0-DP-1/edid"
EndSection