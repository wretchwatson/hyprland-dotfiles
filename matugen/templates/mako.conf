# Mako notification daemon configuration

# Appearance
font=Quicksand Medium 12
background-color=#{{colors.surface.default.hex_stripped}}ee
text-color=#{{colors.on_surface.default.hex_stripped}}
border-color=#{{colors.secondary.default.hex_stripped}}
border-size=2
border-radius=10
padding=15
margin=10

# Position and size
anchor=top-right
width=350
height=100
max-visible=5

# Behavior
default-timeout=5000
ignore-timeout=0
group-by=app-name

# Icons
icons=1
max-icon-size=48
icon-path=/usr/share/icons/Papirus-Dark

# Progress bar
progress-color=over #{{colors.tertiary.default.hex_stripped}}

# Urgency levels
[urgency=low]
background-color=#{{colors.surface.default.hex_stripped}}cc
border-color=#{{colors.primary.default.hex_stripped}}
default-timeout=3000

[urgency=normal]
background-color=#{{colors.surface.default.hex_stripped}}ee
border-color=#{{colors.secondary.default.hex_stripped}}
default-timeout=5000

[urgency=critical]
background-color=#{{colors.error.default.hex_stripped}}ee
border-color=#{{colors.error.default.hex_stripped}}
text-color=#{{colors.on_error.default.hex_stripped}}
default-timeout=0

# App-specific styling
[app-name=volume]
border-color=#{{colors.primary.default.hex_stripped}}
background-color=#{{colors.primary.default.hex_stripped}}aa

[app-name=brightness]
border-color=#{{colors.tertiary.default.hex_stripped}}
background-color=#{{colors.tertiary.default.hex_stripped}}aa

[app-name=battery]
border-color=#{{colors.tertiary.default.hex_stripped}}
background-color=#{{colors.tertiary.default.hex_stripped}}aa

[app-name=network]
border-color=#{{colors.secondary.default.hex_stripped}}
background-color=#{{colors.secondary.default.hex_stripped}}aa

[app-name=spotify]
border-color=#1db954
background-color=#191414ee
default-timeout=4000

[app-name=Spotify]
border-color=#1db954
background-color=#191414ee
default-timeout=4000